# Mansion Deseo ES - Worker API configuration
# D1 created with EU data jurisdiction.

name = "mansion-deseo-api-es"
main = "api/src/index.js"
compatibility_date = "2024-12-01"
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "mansion-deseo-db-es"
database_id = "89854085-e531-4c4b-bffb-ec0f58d0c717"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "mansion-deseo-images-es"

[durable_objects]
bindings = [
  { name = "CHAT_ROOMS", class_name = "ChatRoom" },
  { name = "USER_NOTIFICATIONS", class_name = "UserNotification" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserNotification"]

[vars]
R2_PUBLIC_URL = "https://pub-da03e197cc8641dd8f5374571f9e711b.r2.dev"
CORS_ORIGIN = "https://es.mansiondeseo.com,https://mansiondeseo-site-es.pages.dev"
ENVIRONMENT = "production"
DEBUG_LOGS = "0"
METRICS_LOGS = "0"
METRICS_FLUSH_MS = "60000"
METRICS_FLUSH_REQUESTS = "50"
PROFILE_VISIT_DEDUPE_MINUTES = "30"
PAYMENT_BRIDGE_URL = "https://unicoapps-site.pages.dev"
MAIL_FROM = "noreply@mansiondeseo.com"

[dev]
port = 8788
