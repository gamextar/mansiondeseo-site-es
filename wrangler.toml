# ═══════════════════════════════════════════════════════
# MANSIÓN DESEO — Cloudflare Worker Configuration
# ═══════════════════════════════════════════════════════

name = "mansion-deseo-api"
main = "api/src/index.js"
compatibility_date = "2024-12-01"

# ── Account (set via env or `wrangler login`) ────────
# account_id = "YOUR_ACCOUNT_ID"

# ── D1 Database ──────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "mansion-deseo-db"
database_id = "22136d29-2f21-4c86-96f5-7513f88ff464"

# ── R2 Bucket (image storage) ───────────────────────
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "mansion-deseo-images"
# Create with: wrangler r2 bucket create mansion-deseo-images

# ── Durable Objects ─────────────────────────────────
[durable_objects]
bindings = [
  { name = "CHAT_ROOMS", class_name = "ChatRoom" },
  { name = "USER_NOTIFICATIONS", class_name = "UserNotification" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserNotification"]

# ── Environment Variables ────────────────────────────
[vars]
TURNSTILE_SECRET = ""               # Get from Cloudflare Dashboard → Turnstile
JWT_SECRET = "78b85a92c0ba6b2ca96d6ba06605371a1f4683c2fa37e7783b818d4f9b7baca7"
CORS_ORIGIN = "http://localhost:5173"
R2_PUBLIC_URL = ""                  # Custom domain or R2 public bucket URL
MAIL_FROM = "noreply@unicoapps.com"
# ── Pasarela de pagos ──────────────────────────────────
# Ambos gateways (MercadoPago y Ualá Bis) pasan por el bridge de UnicoApps
PAYMENT_BRIDGE_URL = ""             # En dev: http://localhost:8788
# BRIDGE_SECRET → configurado como secret via: npx wrangler secret put BRIDGE_SECRET

# ── Production overrides ─────────────────────────────
[env.production]

[[env.production.d1_databases]]
binding = "DB"
database_name = "mansion-deseo-db"
database_id = "22136d29-2f21-4c86-96f5-7513f88ff464"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "mansion-deseo-images"

[env.production.durable_objects]
bindings = [
  { name = "CHAT_ROOMS", class_name = "ChatRoom" },
  { name = "USER_NOTIFICATIONS", class_name = "UserNotification" }
]

[env.production.vars]
CORS_ORIGIN = "https://mansiondeseo-site.pages.dev"
ENVIRONMENT = "production"
JWT_SECRET = "78b85a92c0ba6b2ca96d6ba06605371a1f4683c2fa37e7783b818d4f9b7baca7"
TURNSTILE_SECRET = ""
R2_PUBLIC_URL = "https://mansion-deseo-api-production.green-silence-8594.workers.dev/api/images"
MAIL_FROM = "noreply@unicoapps.com"
# ── Pasarela de pagos ──────────────────────────────────
# Ambos gateways (MercadoPago y Ualá Bis) pasan por el bridge de UnicoApps
PAYMENT_BRIDGE_URL = "https://unicoapps-site.pages.dev"  # Sitio B (pages.dev para evitar 502 Worker→Pages)
# BRIDGE_SECRET → configurado como secret via: npx wrangler secret put BRIDGE_SECRET --env production

# ── Routes (if using custom domain) ─────────────────
# routes = [
#   { pattern = "api.mansiondeseo.com/*", zone_name = "mansiondeseo.com" }
# ]

# ── Dev settings ─────────────────────────────────────
[dev]
port = 8787
