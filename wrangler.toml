# ═══════════════════════════════════════════════════════
# MANSIÓN DESEO — Cloudflare Worker Configuration
# ═══════════════════════════════════════════════════════

name = "mansion-deseo-api-production"
main = "api/src/index.js"
compatibility_date = "2024-12-01"

[[routes]]
pattern = "mansiondeseo.com/api/*"
zone_name = "mansiondeseo.com"

[[routes]]
pattern = "www.mansiondeseo.com/api/*"
zone_name = "mansiondeseo.com"

# ── Observability (Workers Logs) ─────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── D1 Database ──────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "mansion-deseo-db"
database_id = "22136d29-2f21-4c86-96f5-7513f88ff464"

# ── R2 Bucket (image storage) ───────────────────────
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "mansion-deseo-images"

# ── Durable Objects ─────────────────────────────────
[durable_objects]
bindings = [
  { name = "CHAT_ROOMS", class_name = "ChatRoom" },
  { name = "USER_NOTIFICATIONS", class_name = "UserNotification" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserNotification"]

# ── Environment Variables ────────────────────────────
[vars]
R2_PUBLIC_URL = "https://media.mansiondeseo.com"
CORS_ORIGIN = "https://mansiondeseo.com,https://www.mansiondeseo.com,https://mansiondeseo-site.pages.dev"
ENVIRONMENT = "production"
JWT_SECRET = "78b85a92c0ba6b2ca96d6ba06605371a1f4683c2fa37e7783b818d4f9b7baca7"
TURNSTILE_SECRET = "0x4AAAAAAC10Snl-nNs65G5dFuGcap8tDCA"
MAIL_FROM = "noreply@mansiondeseo.com"
DEBUG_LOGS = "0"
METRICS_LOGS = "0"
METRICS_FLUSH_MS = "60000"
METRICS_FLUSH_REQUESTS = "50"
PROFILE_VISIT_DEDUPE_MINUTES = "30"
PAYMENT_BRIDGE_URL = "https://unicoapps-site.pages.dev"
CLOUDFLARE_ACCOUNT_ID = "f251d9341172cd4fa210cc7a0308adc6"
REALTIMEKIT_PRESET_NAME = "group_call_host"
# BRIDGE_SECRET → configurado como secret via: npx wrangler secret put BRIDGE_SECRET
# REALTIMEKIT_APP_ID y REALTIMEKIT_API_TOKEN deben configurarse como secrets/vars de producción.

# ── Dev settings ─────────────────────────────────────
[dev]
port = 8787
